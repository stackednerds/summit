name: Build and Push ARM64 Image to GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

env:
  REGISTRY: ghcr.io
  # This will automatically use your github username and repo name (e.g., amit/summit)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU is required for cross-compiling to ARM64 on Ubuntu runners
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Target the Raspberry Pi architecture
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # We provide dummy arguments here just to satisfy the Next.js build phase. 
          # These will be completely overridden by your compose file at runtime.
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy
            NEXT_PUBLIC_URL=http://localhost:3000
            NEXTAUTH_SECRET=dummy_secret
            NEXTAUTH_URL=http://localhost:3000
            CLIENT_AUTH_SECRET=dummy_client_secret
            MINIO_ENDPOINT=localhost
            MINIO_PORT=9000
            MINIO_USE_SSL=false
            MINIO_ACCESS_KEY=minioadmin
            MINIO_SECRET_KEY=minioadmin
            MINIO_BUCKET_NAME=summit
            NEXT_PUBLIC_DISABLE_SIGNUP=0
